<!DOCTYPE html>
<html>
<body>

  <!-- click -->
  <button id="btn">Bấm vào đi!</button>
  <p id="clickText"></p>

  <!-- change -->
  <select id="colorSelect">
    <option value="red">Đỏ</option>
    <option value="black">Đen</option>
    <option value="green">Xanh lá</option>
  </select>
  <p id="colorText">Chọn màu đi!</p>

  <!-- keyup -->
  <input id="nameInput" placeholder="Gõ tên của bạn..." />
  <p id="preview"></p>

  <!-- submit -->
  <form id="myForm">
    <input type="text" placeholder="Vui lòng nhập nội dung..." />
    <button type="submit">Gửi</button>
  </form>
  <p id="submitMsg"></p>

  <script src="../js/events.js"></script>
</body>
</html>
